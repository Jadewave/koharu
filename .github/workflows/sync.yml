name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Quan trọng: Phải có dòng này

      - name: Fetch LFS objects
        run: git lfs pull # Ép GitHub tải file nặng về máy ảo

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Jadewave:$HF_TOKEN@huggingface.co/spaces/Jadewave/trans
          git push --force hf main
