name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # THAY 'username/space-name' bằng thông tin thật của bạn trên Hugging Face
          git push --force https://Jadewave:$HF_TOKEN@huggingface.co/spaces/Jadewave/trans main
